<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Card</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

  <script type="text/javascript">
  var colours=['#ff3366','#ff6699','#ff33cc','#ff99cc','#ff66b2','#ff0066'];
  var minisize=16,maxisize=28,hearts=66,over_or_under="over";
  var x=ox=400,y=oy=300,swide=800,shigh=600,sleft=sdown=0;
  var herz=[],herzx=[],herzy=[],herzs=[],kiss=false;
  if(typeof('addRVLoadEvent')!='function')function addRVLoadEvent(funky){var oldonload=window.onload;if(typeof(oldonload)!='function')window.onload=funky;else window.onload=function(){if(oldonload)oldonload();funky();};}
  addRVLoadEvent(mwah);
  function mwah(){if(document.getElementById){var i,heart;for(i=0;i<hearts;i++){heart=createDiv("auto","auto");heart.style.visibility="hidden";heart.style.zIndex=(over_or_under=="over")?"1001":"0";heart.style.color=colours[i%colours.length];heart.style.pointerEvents="none";heart.style.opacity=0.75;heart.appendChild(document.createTextNode(String.fromCharCode(9829)));document.body.appendChild(heart);herz[i]=heart;herzy[i]=false;}set_scroll();set_width();herzle();}}
  function herzle(){var c;if(Math.abs(x-ox)>1||Math.abs(y-oy)>1){ox=x;oy=y;for(c=0;c<hearts;c++)if(herzy[c]===false){herz[c].firstChild.nodeValue=String.fromCharCode(9829);herz[c].style.left=(herzx[c]=x-minisize/2)+"px";herz[c].style.top=(herzy[c]=y-minisize)+"px";herz[c].style.fontSize=minisize+"px";herz[c].style.fontWeight='normal';herz[c].style.visibility='visible';herzs[c]=minisize;break;}}for(c=0;c<hearts;c++)if(herzy[c]!==false)blow_me_a_kiss(c);setTimeout(herzle,40);}
  document.onmousedown=pucker;document.onmouseup=function(){clearTimeout(kiss);};
  function pucker(){ox=-1;oy=-1;kiss=setTimeout(pucker,100);}
  function blow_me_a_kiss(i){herzy[i]-=herzs[i]/minisize+i%2;herzx[i]+=(i%5-2)/5;if(herzy[i]<sdown-herzs[i]||herzx[i]<sleft-herzs[i]||herzx[i]>sleft+swide-herzs[i]){herz[i].style.visibility="hidden";herzy[i]=false;}else if(herzs[i]>minisize+2&&Math.random()<.5/hearts)break_my_heart(i);else{if(Math.random()<maxisize/herzy[i]&&herzs[i]<maxisize)herz[i].style.fontSize=(++herzs[i])+"px";herz[i].style.top=herzy[i]+"px";herz[i].style.left=herzx[i]+"px";}}
  function break_my_heart(i){herz[i].firstChild.nodeValue=String.fromCharCode(9676);herz[i].style.fontWeight='bold';herzy[i]=false;setTimeout(()=>herz[i].style.visibility="hidden",400);}
  document.onmousemove=mouse;function mouse(e){if(e){y=e.pageY;x=e.pageX;}else{set_scroll();y=event.y+sdown;x=event.x+sleft;}}
  window.onresize=set_width;function set_width(){var sw_min=window.innerWidth||document.documentElement.clientWidth||document.body.clientWidth;swide=sw_min;}
  window.onscroll=set_scroll;function set_scroll(){sdown=window.pageYOffset||document.documentElement.scrollTop||document.body.scrollTop||0;sleft=window.pageXOffset||document.documentElement.scrollLeft||document.body.scrollLeft||0;}
  function createDiv(height,width){var div=document.createElement("div");div.style.position="absolute";div.style.height=height;div.style.width=width;div.style.overflow="hidden";div.style.backgroundColor="transparent";return div;}
  </script>
</head>

<body>
  <div id="wrapper">
    <div class="flag__birthday">
      <img src="./images/1.png" alt="" width="350" class="flag__left">
      <img src="./images/1.png" alt="" width="350" class="flag__right">
    </div>

    <div class="content">
      <div class="left">
        <div class="title">
          <h1 class="happy">
            <span style="--t:4s;">H</span><span style="--t:4.2s;">a</span><span style="--t:4.4s;">p</span><span style="--t:4.6s;">p</span><span style="--t:4.8s;">y</span>
          </h1>
          <h1 class="birthday">
            <span style="--t:5s;">B</span><span style="--t:5.2s;">i</span><span style="--t:5.4s;">r</span><span style="--t:5.6s;">t</span><span style="--t:5.8s;">h</span><span style="--t:6s;">d</span><span style="--t:6.2s;">a</span><span style="--t:6.4s;">y</span>
          </h1>
          <div class="hat"><img src="./images/hat.png" alt="" width="130"></div>
        </div>
        <div class="btn">
          <button id="btn__letter">
            Click here <i class="fa-solid fa-microphone"></i>
          </button>
        </div>
      </div>

      <div class="right">
        <div class="box__account">
          <div class="image">
            <img src="Images/r4.png" alt="r5" border="0">
          </div>
          <div class="name">
            <i class="fa-solid fa-heart"></i>
            <span>To Merxie</span>
            <i class="fa-solid fa-heart"></i>
          </div>
          <div class="balloon_one"><img width="100px" src="./images/balloon1.png" alt=""></div>
          <div class="balloon_two"><img width="100px" src="./images/balloon2.png" alt=""></div>
        </div>
        <div class="cricle">
          <div class="text__cricle">
            <span style="--i:1;">h</span><span style="--i:2;">a</span><span style="--i:3;">p</span><span style="--i:4;">p</span><span style="--i:5;">y</span><span style="--i:6;">-</span><span style="--i:7;">b</span><span style="--i:8;">i</span><span style="--i:9;">r</span><span style="--i:10;">t</span><span style="--i:11;">h</span><span style="--i:12;">d</span><span style="--i:13;">a</span><span style="--i:14;">y</span><span style="--i:15;">-</span>
          </div>
          <i class="fa-solid fa-heart"></i>
        </div>
      </div>
    </div>

    <div class="decorate_star star1" style="--t:15s;"></div>
    <div class="decorate_star star2" style="--t:15.2s;"></div>
    <div class="decorate_star star3" style="--t:15.4s;"></div>
    <div class="decorate_star star4" style="--t:15.6s;"></div>
    <div class="decorate_star star5" style="--t:15.8s;"></div>
    <div class="decorate_flower--one" style="--t:15s;"><img width="20" src="./images/decorate_flower.png" alt=""></div>
    <div class="decorate_flower--two" style="--t:15.3s;"><img width="20" src="./images/decorate_flower.png" alt=""></div>
    <div class="decorate_flower--three" style="--t:15.6s;"><img width="20" src="./images/decorate_flower.png" alt=""></div>
    <div class="decorate_bottom"><img src="./images/decorate.png" alt="" width="100"></div>
  </div>

  <!-- Hidden audio -->
  <audio id="voiceAudio" preload="auto">
    <source src="./MERXIE.mp3" type="audio/mpeg">
  </audio>

  <!-- FULLSCREEN SLIDESHOW OVERLAY -->
  <div id="slideshow-overlay">

    <!-- Top bar: progress + close -->
    <div id="slide-topbar">
      <div id="slide-progress-wrap">
        <div id="slide-progress-bar"></div>
      </div>
      <button id="slide-close"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Images -->
    <div id="slide-track">
      <!--
        ADD YOUR PHOTOS:
        Put image files in the Images/ folder.
        Each photo = one <div class="slide"><img src="Images/filename.jpg" alt=""></div>
        Add as many as you want.
      -->
      <div class="slide active"><img src="Images/Image1.webp" alt=""></div>
      <div class="slide"><img src="Images/Image2.webp" alt=""></div>
      <div class="slide"><img src="Images/Image3.webp" alt=""></div>
      <div class="slide"><img src="Images/Image4.webp" alt=""></div>
      <div class="slide"><img src="Images/Image5.webp" alt=""></div>
      <div class="slide"><img src="Images/Image9.webp" alt=""></div>
      <div class="slide"><img src="Images/Image6.webp" alt=""></div>
      <div class="slide"><img src="Images/Image7.webp" alt=""></div>
      <div class="slide"><img src="Images/Image8.webp" alt=""></div>
      <div class="slide"><img src="Images/Image10.webp" alt=""></div>
      <div class="slide"><img src="Images/Image11.webp" alt=""></div>
      <div class="slide"><img src="Images/Image12.webp" alt=""></div>
      <!-- paste more slides here -->
    </div>

    <!-- Subtitle bar — sits at the bottom, above dots -->
    <div id="subtitle-bar">
      <p id="subtitle-text"></p>
    </div>

    <!-- Dots -->
    <div id="slide-dots"></div>

  </div><!-- end overlay -->

  <script>
    /* ── Subtitle data (from MERXIE.srt) ─────────────────────── */
    function ts(h,m,s,ms){ return h*3600 + m*60 + s + ms/1000; }
    var subs = [
      { start: ts(0,0,0,820),  end: ts(0,0,2,420),  text: "Halo, merxie." },
      { start: ts(0,0,3,0),    end: ts(0,0,5,760),  text: "Selamat ulang tahun untuk orang yang selalu membawa" },
      { start: ts(0,0,5,760),  end: ts(0,0,8,560),  text: "kebahagiaan di hidup orang-orang." },
      { start: ts(0,0,9,540),  end: ts(0,0,15,700), text: "Kita, atas nama Zuzu dan Niva, kita harap" },
      { start: ts(0,0,15,700), end: ts(0,0,21,20),  text: "hidup kamu dipenuhi dengan kebahagiaan dan kegembiraan seperti" },
      { start: ts(0,0,21,20),  end: ts(0,0,23,620), text: "yang kita rasain pas main sama kamu." },
      { start: ts(0,0,24,660), end: ts(0,0,28,520), text: "Senang bisa nemenin kamu di hari ulang tahun" },
      { start: ts(0,0,28,520), end: ts(0,0,31,980), text: "kamu yang ini, yang katanya 20 tahun." },
      { start: ts(0,0,32,280), end: ts(0,0,36,160), text: "Dan semoga kita masih bisa nemenin kamu di" },
      { start: ts(0,0,36,160), end: ts(0,0,38,900), text: "hari ulang tahun kamu yang selanjutnya." },
      { start: ts(0,0,40,560), end: ts(0,0,43,560), text: "And keep laugh like this. (Hihihi)" },
      { start: ts(0,0,46,240), end: ts(0,0,50,120), text: "As you have the world's best luck." },
      { start: ts(0,0,50,720), end: ts(0,0,52,120), text: "Semangat, merci." },
      { start: ts(0,0,52,120), end: ts(0,0,58,360), text: "Kita percaya apapun ke depannya, kamu bisa laluin" },
      { start: ts(0,0,58,360), end: ts(0,1,0,260),  text: "itu semua tanpa terkecuali." },
      { start: ts(0,1,1,360),  end: ts(0,1,2,440),  text: "Kamu kan orang kuat." },
      { start: ts(0,1,4,160),  end: ts(0,1,5,180),  text: "We love you, merci." },
      { start: ts(0,1,6,660),  end: ts(0,1,8,600),  text: "Jangan pernah lupain kita ya." }
    ];

    /* ── Elements ──────────────────────────────────────────────── */
    var audio       = document.getElementById("voiceAudio");
    var overlay     = document.getElementById("slideshow-overlay");
    var slides      = document.querySelectorAll(".slide");
    var dotsWrap    = document.getElementById("slide-dots");
    var subText     = document.getElementById("subtitle-text");
    var subBar      = document.getElementById("subtitle-bar");
    var progressBar = document.getElementById("slide-progress-bar");
    var current     = 0;
    var autoTimer   = null;
    var subtitleRAF = null;
    var lastSub     = -1;

    /* ── Build dots ────────────────────────────────────────────── */
    slides.forEach(function(_, i){
      var d = document.createElement("span");
      d.className = "sdot" + (i===0 ? " sdot-on" : "");
      d.addEventListener("click", function(){ go(i); resetTimer(); });
      dotsWrap.appendChild(d);
    });

    /* ── Slide navigation ──────────────────────────────────────── */
    function go(n){
      slides[current].classList.remove("active");
      dotsWrap.children[current].classList.remove("sdot-on");
      current = (n + slides.length) % slides.length;
      slides[current].classList.add("active");
      dotsWrap.children[current].classList.add("sdot-on");
    }
    function resetTimer(){
      clearInterval(autoTimer);
      autoTimer = setInterval(function(){ go(current+1); }, 4000);
    }

    /* ── Subtitle loop (requestAnimationFrame) ─────────────────── */
    function subtitleLoop(){
      var t = audio.currentTime;
      var found = -1;
      for(var i=0; i<subs.length; i++){
        if(t >= subs[i].start && t < subs[i].end){ found = i; break; }
      }
      if(found !== lastSub){
        lastSub = found;
        if(found === -1){
          subBar.classList.remove("sub-visible");
        } else {
          subText.textContent = subs[found].text;
          subBar.classList.add("sub-visible");
        }
      }

      /* Audio progress bar */
      if(audio.duration){
        progressBar.style.width = (audio.currentTime / audio.duration * 100) + "%";
      }

      subtitleRAF = requestAnimationFrame(subtitleLoop);
    }

    /* ── Open / close ──────────────────────────────────────────── */
    function openSlideshow(){
      overlay.classList.add("show");
      go(0);
      resetTimer();
      audio.play().catch(function(){});
      lastSub = -1;
      subtitleRAF = requestAnimationFrame(subtitleLoop);
    }

    function closeSlideshow(){
      overlay.classList.remove("show");
      clearInterval(autoTimer);
      cancelAnimationFrame(subtitleRAF);
      audio.pause();
      audio.currentTime = 0;
      subBar.classList.remove("sub-visible");
      progressBar.style.width = "0%";
    }

    /* ── Events ────────────────────────────────────────────────── */
    document.getElementById("btn__letter").addEventListener("click", openSlideshow);
    document.getElementById("slide-close").addEventListener("click", closeSlideshow);

    overlay.addEventListener("click", function(e){
      if(e.target === overlay) closeSlideshow();
    });

    document.addEventListener("keydown", function(e){
      if(!overlay.classList.contains("show")) return;
      if(e.key==="ArrowRight"){ go(current+1); resetTimer(); }
      if(e.key==="ArrowLeft") { go(current-1); resetTimer(); }
      if(e.key==="Escape")    closeSlideshow();
    });

    /* Reset subtitle index when audio restarts */
    audio.addEventListener("seeked", function(){ lastSub = -1; });
  </script>
</body>
</html>
